name: ESP32S3 CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix git safe directory
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: ESP-IDF Build (esp32s3)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f /opt/esp/idf/export.sh ]; then
            . /opt/esp/idf/export.sh
          elif [ -f /opt/esp/export.sh ]; then
            . /opt/esp/export.sh
          fi
          command -v idf.py
          idf.py --version
          idf.py set-target esp32s3
          idf.py reconfigure
          idf.py build

      - name: Run Tests (pytest)
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest
          pytest

      - name: Prepare Artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci_artifacts
          cp -f build/*.bin ci_artifacts/ || true
          cp -f build/*.elf ci_artifacts/ || true
          cp -f build/*.map ci_artifacts/ || true
          cp -f build/version.txt ci_artifacts/ || true
          cp -f sdkconfig ci_artifacts/ || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-build-${{ github.sha }}
          path: ci_artifacts
          if-no-files-found: error
