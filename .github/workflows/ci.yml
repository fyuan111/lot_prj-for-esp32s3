name: ESP32S3 CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix git safe directory
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: ESP-IDF Build (esp32s3)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f /opt/esp/idf/export.sh ]; then
            . /opt/esp/idf/export.sh
          elif [ -f /opt/esp/export.sh ]; then
            . /opt/esp/export.sh
          fi
          command -v idf.py
          idf.py --version
          idf.py set-target esp32s3
          idf.py reconfigure

          # Workaround: esp_websocket_client 1.6.1 may call redirect URI API
          # that is not visible in some IDF 5.5 CI header combos.
          WS_FILE="managed_components/espressif__esp_websocket_client/esp_websocket_client.c"
          if [ -f "$WS_FILE" ]; then
            if grep -q "WS_TRANSPORT_REDIRECT_HEADER_SUPPORT" "$WS_FILE"; then
              sed -i '/WS_TRANSPORT_REDIRECT_HEADER_SUPPORT/a #undef WS_TRANSPORT_REDIRECT_HEADER_SUPPORT\n#define WS_TRANSPORT_REDIRECT_HEADER_SUPPORT    0' "$WS_FILE"
            fi
          fi

          idf.py build

      - name: Run Tests (stdlib)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import importlib.util
          from pathlib import Path

          root = Path(".").resolve()
          tests = [
              root / "tests" / "test_partitions.py",
              root / "tests" / "test_version_file.py",
          ]

          for test_file in tests:
              spec = importlib.util.spec_from_file_location(test_file.stem, test_file)
              mod = importlib.util.module_from_spec(spec)
              assert spec.loader is not None
              spec.loader.exec_module(mod)
              for name in dir(mod):
                  if name.startswith("test_") and callable(getattr(mod, name)):
                      print(f"[TEST] {test_file.name}::{name}")
                      getattr(mod, name)()
          print("[TEST] all passed")
          PY

      - name: Prepare Artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci_artifacts
          cp -f build/*.bin ci_artifacts/ || true
          cp -f build/*.elf ci_artifacts/ || true
          cp -f build/*.map ci_artifacts/ || true
          cp -f build/version.txt ci_artifacts/ || true
          cp -f sdkconfig ci_artifacts/ || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-build-${{ github.sha }}
          path: ci_artifacts
          if-no-files-found: error
